name: format

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C++ formatting
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-18
          clang-format-18 --version
          clang-format-18 --dry-run --Werror repro_sum.hpp repro_test.cpp example.cpp
